name: Verify System CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify-system:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install --ignore-scripts
      - name: Run syntax checks
        run: npm run check:js
      - name: Run predeploy check
        run: npm run predeploy-check
      - name: Run Verify System E2E smoke test
        run: npm run verify:e2e
