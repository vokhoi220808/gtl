<!DOCTYPE html>
<html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="theme-color" content="#1a1a2e"><meta name="robots" content="noindex,nofollow"><title>Xác minh tài liệu | PDF Fusion Smart Pro</title><link rel="manifest" href="./manifest.json"><link rel="icon" href="./favicon.svg" type="image/svg+xml"><style>body{margin:0;min-height:100vh;background:#080810;color:#f0f0ff;font-family:system-ui,-apple-system,Segoe UI,sans-serif;padding:24px;display:grid;place-items:center}.card{width:min(760px,100%);border:1px solid rgba(255,255,255,.14);border-radius:24px;background:linear-gradient(135deg,rgba(124,110,247,.14),rgba(224,64,251,.08));padding:28px;box-shadow:0 24px 80px rgba(0,0,0,.35)}h1{margin:0 0 8px;font-size:clamp(28px,5vw,46px)}p{line-height:1.65;color:#c9c9e8}.id{font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:clamp(18px,4vw,30px);word-break:break-all;background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.15);border-radius:16px;padding:16px;margin:16px 0}.row{display:flex;gap:10px;flex-wrap:wrap}.btn{border:0;border-radius:14px;padding:12px 16px;background:rgba(255,255,255,.10);color:white;text-decoration:none;font-weight:700;cursor:pointer}.btn.good{background:linear-gradient(135deg,#7c6ef7,#e040fb)}.note{font-size:13px;color:#aaaad0;margin-top:18px}</style></head><body><main class="card"><h1>Xác minh tài liệu</h1><p>Trang này hiển thị mã xác minh được nhúng trong QR của PDF Fusion Smart Pro.</p><div class="id" id="docId">Đang đọc mã...</div><div class="row"><button class="btn good" id="copyBtn" type="button">Copy mã</button><a class="btn" href="./index.html">Mở PDF Fusion</a></div><p class="note">Lưu ý: đây là trang xác minh cục bộ theo ID/QR. Muốn xác thực chống giả mạo ở mức pháp lý cần backend lưu hash tài liệu, thời gian ký và chữ ký số.</p></main><script>const p=new URLSearchParams(location.search);const id=(p.get('id')||'').trim();const el=document.getElementById('docId');el.textContent=id||'Không có mã ID trong URL.';document.getElementById('copyBtn').onclick=async()=>{try{await navigator.clipboard.writeText(id||location.href);el.textContent=(id||'URL')+'  ✓ đã copy'}catch{}};</script></body></html>
